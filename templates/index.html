<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart City GIS | เทศบาลตำบลแม่จัน</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 10; transition: height 0.3s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .leaflet-popup-content { font-family: 'Prompt', sans-serif; margin: 12px 14px; min-width: 240px !important; }
    </style>
</head>
<body class="bg-slate-900 text-white flex h-screen w-screen m-0 p-0">

    <div class="w-80 bg-slate-800 flex flex-col justify-between border-r border-slate-700 z-20 shadow-xl">
        <div class="p-4 flex flex-col flex-1 overflow-y-auto hide-scrollbar">
            <div class="flex items-center space-x-3 mb-6">
                <div class="p-2 bg-emerald-500/20 rounded-lg text-emerald-400">
                    <i class="fa-solid fa-map-location-dot text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-semibold tracking-wide text-emerald-400">Maechan GIS</h1>
                    <p class="text-xs text-slate-400">SMART CITY DATA PLATFORM</p>
                </div>
            </div>

            <div class="flex items-center justify-between mb-4">
                <span class="text-sm font-medium tracking-wider text-slate-300">ชั้นข้อมูล (LAYERS)</span>
                <input type="file" id="shpFileInput" accept=".zip" class="hidden" onchange="handleShpUpload(event)">
                <button onclick="triggerFileInput()" class="bg-emerald-500 hover:bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg flex items-center space-x-1 font-medium transition shadow-md shadow-emerald-900/20">
                    <i class="fa-solid fa-plus text-xs"></i> <span>เพิ่ม</span>
                </button>
            </div>

            <div class="space-y-3" id="layerContainer">
                <div class="bg-slate-700/50 p-3 rounded-xl border border-slate-600/50 flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <input type="checkbox" checked class="w-4 h-4 text-emerald-500 rounded bg-slate-800 border-slate-600 focus:ring-emerald-500">
                        <span class="text-sm text-slate-200">ผังเมืองแม่จัน</span>
                    </div>
                    <div class="flex space-x-2 text-slate-400 text-xs">
                        <button class="hover:text-white"><i class="fa-solid fa-eye"></i></button>
                        <button class="hover:text-white"><i class="fa-solid fa-gear"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-4 border-t border-slate-700 text-center text-xs text-slate-500 font-light bg-slate-850">
            Designed by Kru Best &copy; 2026
        </div>
    </div>

    <div class="flex-1 relative">
        <div id="map"></div>
        
        <div id="loadingOverlay" class="hidden absolute inset-0 bg-slate-900/80 z-[1000] flex flex-col items-center justify-content justify-center space-y-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-500"></div>
            <p class="text-sm text-slate-300 font-medium">กำลังนำเข้าข้อมูล...</p>
        </div>
    </div>

    <script>
        // 1. Initialize Leaflet Map (พิกัดเริ่มต้น อำเภอแม่จัน เชียงราย)
        const map = L.map('map').setView([20.1472, 99.8532], 14);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // ฟังก์ชันเปิดเลือกไฟล์
        function triggerFileInput() {
            document.getElementById('shpFileInput').click();
        }

        // 2. ฟังก์ชันจัดการไฟล์และแก้ไขบักดักจับ Null / Empty Type ตัวปัญหา
        async function handleShpUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.remove('hidden');

            try {
                const reader = new FileReader();
                reader.onload = async function (e) {
                    try {
                        const buffer = e.target.result;
                        // แปลง Shapefile Zip เป็น GeoJSON โดยพึ่งพา shpjs
                        const geojson = await shp(buffer);
                        
                        let rawFeatures = [];
                        if (Array.isArray(geojson)) {
                            geojson.forEach(layer => { if (layer && layer.features) rawFeatures.push(...layer.features); });
                        } else if (geojson && geojson.features) {
                            rawFeatures = geojson.features;
                        }

                        // ==========================================
                        // แก้ไขจุดเกิดเหตุหลัก: ล้างข้อมูลเสียฝั่ง Frontendก่อนส่ง
                        // ==========================================
                        const cleanFeatures = rawFeatures.filter(feature => {
                            return (
                                feature !== null && 
                                typeof feature === 'object' &&
                                feature.type !== undefined && // ป้องกันการอ่าน 'type' ของ null
                                feature.type === 'Feature' &&
                                feature.geometry !== null &&
                                feature.geometry.type !== undefined
                            );
                        }).map(feature => {
                            // ป้องกันกรณีที่ Properties ด้านในหลุดค่าว่างเปล่า (None)
                            if (!feature.properties || feature.properties === null) {
                                feature.properties = {};
                            }
                            return feature;
                        });

                        // หากไม่มีข้อมูลฟีเจอร์ใช้งานได้เลย ให้แจ้งเตือนตัดจบการทำงาน
                        if (cleanFeatures.length === 0) {
                            throw new Error("โครงสร้างภายในไฟล์เสียหาย หรือไม่มีพิกัดรูปทรง (Geometry Null)");
                        }

                        // ประกอบกลับร่างเป็น GeoJSON FeatureCollection สมบูรณ์
                        const cleanGeoJSON = {
                            type: "FeatureCollection",
                            features: cleanFeatures
                        };

                        // 3. ยิงข้อมูลไปหาหลังบ้านเพื่อบันทึก
                        sendDataToBackend(cleanGeoJSON);

                        // 4. Render แสดงผลบนแผ่นที่ Leaflet ทันที
                        L.geoJSON(cleanGeoJSON, {
                            style: function (feature) {
                                return { color: "#10b981", weight: 3, opacity: 0.8 };
                            },
                            onEachFeature: function (feature, layer) {
                                if (feature.properties) {
                                    let popupContent = "<div class='text-slate-800 font-medium mb-1 border-b pb-1 text-sm text-emerald-600'>รายละเอียดข้อมูล</div><table class='w-full text-xs text-left text-slate-600'>";
                                    for (let key in feature.properties) {
                                        if(typeof feature.properties[key] !== 'object'){
                                            popupContent += `<tr><td class='font-semibold py-0.5 pr-2'>${key}:</td><td>${feature.properties[key]}</td></tr>`;
                                        }
                                    }
                                    popupContent += "</table>";
                                    layer.bindPopup(popupContent);
                                }
                            }
                        }).addTo(map);

                    } catch (err) {
                        alert("เกิดข้อผิดพลาดในการประมวลผลไฟล์: " + err.message);
                    } finally {
                        loading.classList.add('hidden');
                        document.getElementById('shpFileInput').value = ''; // ล้างค่าสเตตัสเก่า
                    }
                };
                
                reader.readAsArrayBuffer(file);

            } catch (globalError) {
                alert("ล้มเหลว: " + globalError.message);
                loading.classList.add('hidden');
            }
        }

        // 4. ส่งข้อมูลชุดที่คลีนแล้วเข้า Route API ของ Flask
        function sendDataToBackend(geoJsonData) {
            fetch('/api/features', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(geoJsonData)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    console.log("บันทึกข้อมูลเรียบร้อยแล้ว: " + data.count + " ฟีเจอร์");
                } else {
                    alert("เซิร์ฟเวอร์ปฏิเสธการบันทึก: " + data.message);
                }
            })
            .catch(error => {
                console.error("Error network:", error);
                alert("ไม่สามารถติดต่อเซิร์ฟเวอร์หลังบ้านได้");
            });
        }
    </script>
</body>
</html>
