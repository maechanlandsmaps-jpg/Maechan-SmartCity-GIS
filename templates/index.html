<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart City GIS | เทศบาลตำบลแม่จัน</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/togeojson/0.16.0/togeojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/shpjs@latest/dist/shp.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 10; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .leaflet-popup-content { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="flex h-screen bg-slate-100 relative">

    <div id="mobile-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[50] hidden md:hidden opacity-0 transition-opacity duration-300"></div>

    <aside id="sidebar" class="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-[60] fixed md:relative h-full shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900">
            <div>
                <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-3">
                    <i class="fa-solid fa-map-location-dot"></i> Maechan GIS
                </h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Smart City Data Platform</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white p-1">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        
        <div class="flex-1 p-4 flex flex-col overflow-hidden">
            <div class="flex flex-col gap-3 mb-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider">ชั้นข้อมูล (Layers)</h2>
                    <button onclick="openAddLayerModal()" class="text-xs bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-md transition font-bold shadow-md">
                        <i class="fa-solid fa-plus"></i> เพิ่ม
                    </button>
                </div>
            </div>
            <div class="space-y-3 overflow-y-auto flex-1 hide-scrollbar" id="layer-container">
                <div class="text-center text-slate-500 text-sm mt-10"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดข้อมูล...</div>
            </div>
        </div>

        <div class="p-4 border-t border-slate-800 bg-slate-800/50">
            <button onclick="exportGeoJSON()" class="w-full bg-slate-800 hover:bg-slate-700 text-blue-400 text-xs font-bold py-3 rounded-lg transition border border-slate-700 shadow-sm mb-2"><i class="fa-solid fa-download mr-1"></i> ส่งออกข้อมูลทั้งหมด</button>
            <div class="flex gap-2">
                <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-emerald-400 text-xs font-bold py-3 rounded-lg transition border border-slate-700 shadow-sm"><i class="fa-solid fa-upload mr-1"></i> นำเข้า JSON</button>
                <button onclick="document.getElementById('importShp').click()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-amber-400 text-xs font-bold py-3 rounded-lg transition border border-slate-700 shadow-sm"><i class="fa-solid fa-file-zipper mr-1"></i> นำเข้า SHP (.zip)</button>
                <input type="file" id="importFile" accept=".geojson,.json" class="hidden" onchange="importFileHandler(event)">
                <input type="file" id="importShp" accept=".zip" class="hidden" onchange="importShpHandler(event)">
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative z-10 w-full overflow-hidden">
        <button onclick="toggleSidebar()" class="md:hidden absolute top-4 right-4 z-[40] bg-white text-slate-800 w-10 h-10 rounded-xl shadow-lg border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition">
            <i class="fa-solid fa-bars text-lg"></i>
        </button>

        <div id="map"></div>
    </main>

    <div id="loadingModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] hidden flex items-center justify-center">
        <div class="bg-white rounded-xl p-6 flex flex-col items-center shadow-2xl m-4 text-center">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p class="font-bold text-slate-700">กำลังประมวลผล...</p>
            <p class="text-xs text-slate-500 mt-1">โปรดรอสักครู่ ระบบกำลังจัดการข้อมูล</p>
        </div>
    </div>

    <div id="layerModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center transition-opacity duration-300">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl m-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5 border-b pb-3">
                <h2 class="text-lg font-bold text-slate-800" id="modalTitle">สร้างชั้นข้อมูลใหม่</h2>
                <button onclick="toggleModal('layerModal')" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="saveLayer(event)" class="space-y-4">
                <input type="hidden" id="edit_layer_name_old">
                <div><label class="block text-xs font-bold text-slate-600 mb-1">ชื่อชั้นข้อมูล</label><input type="text" id="new_layer_name" required class="w-full border rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">สีสัญลักษณ์</label><input type="color" id="new_layer_color" value="#10b981" class="w-full h-10 rounded-lg cursor-pointer border-0 p-0"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">ประเภท</label><select id="new_layer_type" class="w-full border rounded-lg p-2.5 text-sm bg-white"><option value="Point">จุด (Marker)</option><option value="Line">เส้น / รูปปิด</option></select></div>
                </div>
                
                <div class="pt-4 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-600">ฟิลด์ข้อมูลเพิ่มเติม (Attributes)</label>
                        <button type="button" onclick="addFieldRow()" class="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded font-bold"><i class="fa-solid fa-plus"></i> เพิ่มฟิลด์</button>
                    </div>
                    <div id="fields_container" class="space-y-2"></div>
                </div>

                <div class="flex flex-col gap-2 pt-4">
                    <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-2.5 rounded-lg text-sm shadow-md transition hover:bg-emerald-600">บันทึกชั้นข้อมูล</button>
                    <button type="button" id="btnDeleteLayer" onclick="deleteCurrentLayer()" class="hidden w-full bg-red-50 text-red-500 font-bold py-2.5 rounded-lg text-sm border border-red-100 hover:bg-red-500 hover:text-white transition">ลบชั้นข้อมูลนี้ทิ้ง</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🌍 1. อัปเกรดเป็น Google Maps ดาวเทียม! ปลดล็อกการซูมลึกสุดๆ
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { 
            maxZoom: 22, // เปิดให้ซูมได้ลึกขึ้น
            maxNativeZoom: 19 
        });
        
        // ใช้ Google Maps แบบ Hybrid (มีดาวเทียม + เส้นถนน/ป้ายชื่อภาษาไทย)
        const googleSatellite = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            maxZoom: 22, // Google Maps อนุญาตให้ซูมได้ระดับ 22 เลยครับ!
            attribution: '© Google'
        });

        const map = L.map('map', { 
            center: [20.1525, 99.8475], 
            zoom: 15, 
            layers: [osmLayer], 
            zoomControl: false,
            maxZoom: 22 // อนุญาตให้แผนที่รวมซูมได้ระดับ 22
        });
        
        L.control.zoom({ position: 'topleft' }).addTo(map);
        L.control.layers({ "แผนที่ถนน (OSM)": osmLayer, "ดาวเทียม (Google Maps)": googleSatellite }, null, {position: 'bottomright'}).addTo(map);
        map.pm.addControls({ position: 'topleft', drawCircleMarker: false, drawCircle: false, drawText: false });

        let appLayers = [];
        let layerGroups = {};
        let allFeatures = [];

        async function fetchLayers() {
            const res = await fetch('/api/layers');
            appLayers = await res.json();
            const container = document.getElementById('layer-container');
            container.innerHTML = '';
            
            appLayers.forEach(layer => {
                if (!layerGroups[layer.name]) layerGroups[layer.name] = L.featureGroup().addTo(map);
                
                container.innerHTML += `
                    <label class="block cursor-pointer">
                        <div class="flex items-center justify-between p-3 bg-slate-800 rounded-xl border border-slate-700 hover:border-emerald-500 transition">
                            <div class="flex items-center gap-3">
                                <input type="radio" name="active_layer" value="${layer.name}" checked class="w-4 h-4 accent-emerald-500">
                                <span class="text-sm font-medium" style="color: ${layer.color}"><i class="fa-solid fa-layer-group"></i> ${layer.name}</span>
                            </div>
                            <button type="button" onclick="event.preventDefault(); deleteCurrentLayer('${layer.name}')" class="text-slate-500 hover:text-red-400 p-1.5 transition"><i class="fa-solid fa-trash-can text-xs"></i></button>
                        </div>
                    </label>`;
            });
            fetchFeatures();
        }

        async function fetchFeatures() {
            Object.values(layerGroups).forEach(g => g.clearLayers());
            const res = await fetch('/api/features');
            const data = await res.json();
            allFeatures = data.features;
            L.geoJSON(data, {
                pointToLayer: (f, latlng) => {
                    const lInfo = appLayers.find(l => l.name === f.properties.layer_name);
                    const color = lInfo ? lInfo.color : '#3388ff';
                    return L.circleMarker(latlng, { radius: 8, color: color, fillColor: color, fillOpacity: 0.8 });
                },
                style: (f) => {
                    const lInfo = appLayers.find(l => l.name === f.properties.layer_name);
                    return { color: lInfo ? lInfo.color : '#3388ff', weight: 4 };
                },
                onEachFeature: (f, layer) => {
                    let customPropsHtml = '';
                    for(let key in f.properties) { if(!['id', 'layer_name'].includes(key)) customPropsHtml += `<p><span class="font-bold">${key}:</span> ${f.properties[key]}</p>`; }
                    layer.bindPopup(`<div class="p-2"><h3 class="font-bold border-b mb-2 text-emerald-600">${f.properties.layer_name}</h3><div class="text-xs mb-3 space-y-1">${customPropsHtml || '<p class="text-slate-500 italic">ไม่มีข้อมูลเพิ่มเติม</p>'}</div><button onclick="deleteFeature(${f.properties.id})" class="w-full bg-red-50 text-red-500 py-1.5 rounded text-[10px] font-bold border border-red-100 hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-trash-can"></i> ลบพิกัดนี้</button></div>`);
                    if (layerGroups[f.properties.layer_name]) layerGroups[f.properties.layer_name].addLayer(layer);
                }
            });
        }

        map.pm.setLang('th');
        map.on('pm:create', async (e) => {
            const activeRadio = document.querySelector('input[name="active_layer"]:checked');
            if (!activeRadio) { alert("กรุณาสร้างหรือเลือกชั้นข้อมูลก่อนครับ"); e.layer.remove(); return; }
            const lInfo = appLayers.find(l => l.name === activeRadio.value);
            
            let tempLayer = e.layer;
            if (e.shape === "Marker") {
                const latlng = tempLayer.getLatLng(); map.removeLayer(tempLayer);
                tempLayer = L.circleMarker(latlng, { color: lInfo.color, radius: 8, fillColor: lInfo.color, fillOpacity: 0.8 }).addTo(map);
            } else { tempLayer.setStyle({ color: lInfo.color, weight: 4 }); }
            
            let properties = {};
            if(confirm(`ต้องการบันทึกพิกัดนี้ลงในชั้นข้อมูล "${lInfo.name}" ใช่หรือไม่?`)) {
                const geojson = tempLayer.toGeoJSON();
                const response = await fetch('/api/features', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ layer_name: lInfo.name, properties: properties, geojson: geojson }) });
                const data = await response.json();
                if(data.status === "success") { alert("บันทึกสำเร็จ"); tempLayer.remove(); fetchFeatures(); } else { alert(data.message); tempLayer.remove(); }
            } else { tempLayer.remove(); }
        });

        window.importShpHandler = async function(event) {
            const file = event.target.files[0]; if (!file) return;
            let layerNamePrompt = prompt("ตั้งชื่อชั้นข้อมูลพื้นฐานสำหรับไฟล์ที่นำเข้า:", file.name.split('.')[0]); if (!layerNamePrompt) { event.target.value = ''; return; }
            document.getElementById('loadingModal').classList.remove('hidden');
            try {
                const geojsonAll = await shp(await file.arrayBuffer());
                let featuresByGeometry = { 'Point': [], 'LineString': [], 'Polygon': [], 'MultiPoint': [], 'MultiLineString': [], MultiPolygon: [] };
                let featuresToIgnore = [];

                geojsonAll.features.forEach(f => {
                    if (featuresByGeometry[f.geometry.type]) { featuresByGeometry[f.geometry.type].push(f); } 
                    else { featuresToIgnore.push(f); }
                });

                for (let geomType in featuresByGeometry) {
                    const features = featuresByGeometry[geomType];
                    if (features.length === 0) continue;

                    let newLayerName = `${layerNamePrompt}_${geomType}`; 
                    let color = `#${Math.floor(Math.random()*16777215).toString(16)}`; 
                    let autoFields = [];
                    for(let key in features[0].properties) { autoFields.push({name: key, type: 'Text'}); }

                    await fetch('/api/layers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: newLayerName, color: color, type: (geomType.includes('Point') ? 'Point' : 'Line'), fields: autoFields }) });
                    
                    for(let feature of features) {
                        feature.properties.layer_name = newLayerName; 
                        await fetch('/api/features', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ layer_name: newLayerName, properties: feature.properties, geojson: feature.geometry }) });
                    }
                }
                alert(`นำเข้าข้อมูลเรียบร้อยแล้วครับ!`); location.reload();
            } catch (err) { alert("Error: " + err.message); console.error(err); } finally { document.getElementById('loadingModal').classList.add('hidden'); event.target.value = ''; }
        };

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        window.openAddLayerModal = function() { toggleSidebar(); alert("กรุณาใช้ฟังก์ชันนำเข้า JSON หรือ SHP ด้านล่างเพื่อเพิ่มชั้นข้อมูลพร้อมข้อมูลครับ"); }
        async function deleteCurrentLayer(name) { if (confirm(`คุณต้องการลบชั้นข้อมูล "${name}" และพิกัดทั้งหมดในนี้ใช่หรือไม่?`)) { await fetch(`/api/layers/${encodeURIComponent(name)}`, { method: 'DELETE' }); location.reload(); } }
        async function deleteFeature(id) { if (confirm('คุณต้องการลบพิกัดนี้ใช่หรือไม่?')) { await fetch(`/api/features/${id}`, { method: 'DELETE' }); fetchFeatures(); map.closePopup(); } }
        window.exportGeoJSON = function() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ type: "FeatureCollection", features: allFeatures })); const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", "Maechan_SmartCity_Data.geojson"); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove(); };
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        fetchLayers();
    </script>
</body>
</html>
