<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart City GIS | เทศบาลตำบลแม่จัน</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.14.2/dist/leaflet-geoman.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 10; transition: height 0.3s ease; }
        #attribute-panel { height: 0; transition: height 0.3s ease; overflow: hidden; display: flex; flex-direction: column; }
        #attribute-panel.open { height: 45vh; border-top: 4px solid #1e293b; } 
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex h-screen bg-slate-100 relative">

    <aside id="sidebar" class="w-80 bg-slate-900 text-white flex flex-col shadow-2xl z-[60] fixed md:relative h-full shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300">
        <div class="p-6 border-b border-slate-800 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-3">
                    <i class="fa-solid fa-map-location-dot"></i> Maechan GIS
                </h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">Smart City Data Platform</p>
            </div>
        </div>
        
        <div class="flex-1 p-4 flex flex-col overflow-hidden">
            <div class="flex flex-col gap-3 mb-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider">ชั้นข้อมูล (Layers)</h2>
                    <button onclick="openAddLayerModal()" class="text-xs bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-md font-bold shadow-md">
                        <i class="fa-solid fa-plus"></i> เพิ่ม
                    </button>
                </div>
                <div class="flex gap-1 justify-between items-center">
                    <select id="bufferRadiusSelect" class="text-[10px] bg-slate-800 text-white border border-slate-700 rounded px-1 py-2 w-16 text-center outline-none">
                        <option value="50">50m</option><option value="100">100m</option><option value="200">200m</option><option value="500">500m</option>
                    </select>
                    <button onclick="drawCombinedAnalysis()" class="flex-1 text-[10px] bg-purple-500 hover:bg-purple-600 text-white px-1 py-2 rounded transition font-bold shadow-md">
                        <i class="fa-solid fa-bullseye"></i> วิเคราะห์รัศมี
                    </button>
                </div>
            </div>
            <div class="space-y-3 overflow-y-auto flex-1 hide-scrollbar" id="layer-container"></div>
        </div>
        <div class="p-4 border-t border-slate-800 bg-slate-800/50">
            <button onclick="location.reload()" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-lg text-xs font-bold text-white transition">
                <i class="fa-solid fa-rotate mr-1"></i> รีเฟรชข้อมูล
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative z-10 w-full overflow-hidden">
        <div id="map"></div>
        <div id="attribute-panel" class="bg-white z-30 shadow-2xl flex flex-col">
            <div class="p-3 flex justify-between items-center border-b bg-slate-50 shrink-0">
                <h3 class="font-bold text-slate-800 text-sm"><i class="fa-solid fa-table text-blue-500 mr-2"></i> <span id="current-table-layer">-</span></h3>
                <button onclick="closeTable()" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="flex-1 overflow-auto"><table id="attribute-table" class="text-xs text-left w-full"><thead id="table-head" class="bg-slate-50 sticky top-0"></thead><tbody id="table-body"></tbody></table></div>
        </div>
    </main>

    <div id="layerModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl m-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5 border-b pb-3">
                <h2 class="text-lg font-bold text-slate-800" id="modalTitle">สร้างชั้นข้อมูลใหม่</h2>
                <button onclick="toggleModal('layerModal')" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <form onsubmit="saveLayer(event)" class="space-y-4">
                <input type="hidden" id="edit_layer_name_old">
                <div><label class="block text-xs font-bold text-slate-600 mb-1">ชื่อชั้นข้อมูล</label><input type="text" id="new_layer_name" required class="w-full border rounded-lg p-2.5 text-sm outline-none focus:border-emerald-500"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">สีสัญลักษณ์</label><input type="color" id="new_layer_color" value="#10b981" class="w-full h-10 rounded-lg cursor-pointer"></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">ประเภท</label><select id="new_layer_type" class="w-full border rounded-lg p-2.5 text-sm bg-white"><option value="Point">จุด (Marker)</option><option value="Line">เส้น / รูปปิด</option></select></div>
                </div>
                
                <div class="pt-4 border-t border-slate-100">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold text-slate-600">ฟิลด์ข้อมูลเพิ่มเติม (Attributes)</label>
                        <button type="button" onclick="addFieldRow()" class="text-[10px] bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded font-bold"><i class="fa-solid fa-plus"></i> เพิ่มฟิลด์</button>
                    </div>
                    <div id="fields_container" class="space-y-2"></div>
                </div>

                <div class="flex flex-col gap-2 pt-4">
                    <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-2.5 rounded-lg text-sm shadow-md">บันทึกชั้นข้อมูล</button>
                    <button type="button" id="btnDeleteLayer" onclick="deleteCurrentLayer()" class="hidden w-full bg-red-50 text-red-500 font-bold py-2.5 rounded-lg text-sm border border-red-100 hover:bg-red-500 hover:text-white transition">ลบชั้นข้อมูลนี้ทิ้ง</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const map = L.map('map', { center: [20.1525, 99.8475], zoom: 15, zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        map.pm.addControls({ position: 'topleft', drawCircleMarker: false, drawPolyline: true });

        let appLayers = [];
        let layerGroups = {};
        let allFeatures = [];

        async function fetchLayers() {
            const res = await fetch('/api/layers');
            appLayers = await res.json();
            const container = document.getElementById('layer-container');
            container.innerHTML = '';
            appLayers.forEach(layer => {
                if (!layerGroups[layer.name]) layerGroups[layer.name] = L.featureGroup().addTo(map);
                container.innerHTML += `
                    <div class="p-3 bg-slate-800 rounded-xl flex items-center justify-between border-2 border-transparent hover:border-emerald-500 transition cursor-pointer">
                        <div class="flex items-center gap-3">
                            <input type="radio" name="active_layer" value="${layer.name}" checked class="w-4 h-4 accent-emerald-500">
                            <span class="text-sm" style="color: ${layer.color}"><i class="fa-solid fa-layer-group"></i> ${layer.name}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openEditModal('${layer.name}')" class="text-slate-500 hover:text-emerald-400 p-1"><i class="fa-solid fa-pen text-xs"></i></button>
                            <button onclick="openTable('${layer.name}')" class="text-slate-500 hover:text-blue-400 p-1"><i class="fa-solid fa-table text-xs"></i></button>
                        </div>
                    </div>`;
            });
            fetchFeatures();
        }

        async function fetchFeatures() {
            Object.values(layerGroups).forEach(g => g.clearLayers());
            const res = await fetch('/api/features');
            const data = await res.json();
            allFeatures = data.features;
            L.geoJSON(data, {
                pointToLayer: (f, latlng) => {
                    const lInfo = appLayers.find(l => l.name === f.properties.layer_name);
                    const color = lInfo ? lInfo.color : '#3388ff';
                    return L.circleMarker(latlng, { radius: 8, color: color, fillColor: color, fillOpacity: 0.8 });
                },
                style: (f) => {
                    const lInfo = appLayers.find(l => l.name === f.properties.layer_name);
                    return { color: lInfo ? lInfo.color : '#3388ff', weight: 4 };
                },
                onEachFeature: (f, layer) => {
                    let popupHtml = `<div class="p-2"><h3 class="font-bold border-b mb-2">${f.properties.layer_name}</h3><div class="text-xs mb-3">`;
                    for(let key in f.properties) { if(!['id', 'layer_name'].includes(key)) popupHtml += `<b>${key}:</b> ${f.properties[key]}<br>`; }
                    popupHtml += `</div><button onclick="deleteFeature(${f.properties.id})" class="w-full bg-red-50 text-red-500 py-1 rounded text-xs font-bold border border-red-100">ลบพิกัดนี้</button></div>`;
                    layer.bindPopup(popupHtml);
                    if (layerGroups[f.properties.layer_name]) layerGroups[f.properties.layer_name].addLayer(layer);
                }
            });
        }

        // ระบบเพิ่มฟิลด์ (Attributes)
        function addFieldRow(name = '', type = 'Text') {
            const container = document.getElementById('fields_container');
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center bg-slate-50 p-2 rounded border border-slate-200";
            div.innerHTML = `
                <input type="text" placeholder="ชื่อฟิลด์" value="${name}" required class="field-name-input flex-1 border rounded px-2 py-1 text-xs outline-none">
                <select class="field-type-input border rounded px-2 py-1 text-xs bg-white">
                    <option value="Text" ${type === 'Text' ? 'selected' : ''}>ข้อความ</option>
                    <option value="Number" ${type === 'Number' ? 'selected' : ''}>ตัวเลข</option>
                    <option value="Date" ${type === 'Date' ? 'selected' : ''}>วันที่</option>
                </select>
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 p-1"><i class="fa-solid fa-trash"></i></button>
            `;
            container.appendChild(div);
        }

        async function saveLayer(e) {
            e.preventDefault();
            const name = document.getElementById('new_layer_name').value;
            const color = document.getElementById('new_layer_color').value;
            const type = document.getElementById('new_layer_type').value;
            const fields = [];
            document.querySelectorAll('.field-name-input').forEach((input, i) => {
                fields.push({ name: input.value, type: document.querySelectorAll('.field-type-input')[i].value });
            });
            await fetch('/api/layers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, color, type, fields }) });
            toggleModal('layerModal'); fetchLayers();
        }

        map.on('pm:create', async (e) => {
            const activeRadio = document.querySelector('input[name="active_layer"]:checked');
            if (!activeRadio) { alert("กรุณาสร้างชั้นข้อมูลก่อนครับ"); e.layer.remove(); return; }
            const lInfo = appLayers.find(l => l.name === activeRadio.value);
            
            // สร้าง Form กรอกข้อมูลตามฟิลด์ที่ออกแบบไว้
            let formHtml = `<div class="p-2"><b>ชั้นข้อมูล: ${lInfo.name}</b><br><br>`;
            lInfo.fields.forEach(f => {
                let iType = f.type === 'Number' ? 'number' : (f.type === 'Date' ? 'date' : 'text');
                formHtml += `<label class="text-[10px] font-bold">${f.name}</label><input type="${iType}" id="f_${f.name}" class="w-full border rounded p-1 mb-2 text-xs">`;
            });
            formHtml += `<button onclick="confirmSaveFeature('${lInfo.name}')" class="w-full bg-blue-500 text-white py-1.5 rounded mt-2 text-xs font-bold">บันทึกพิกัด</button></div>`;
            
            window.tempLayer = e.layer;
            e.layer.bindPopup(formHtml).openPopup();
        });

        window.confirmSaveFeature = async function(layerName) {
            const lInfo = appLayers.find(l => l.name === layerName);
            const properties = {};
            lInfo.fields.forEach(f => { properties[f.name] = document.getElementById(`f_${f.name}`).value; });
            const geojson = window.tempLayer.toGeoJSON();
            await fetch('/api/features', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ layer_name: layerName, properties: properties, geojson: geojson }) });
            window.tempLayer.remove(); fetchFeatures();
        }

        async function deleteCurrentLayer() {
            const name = document.getElementById('edit_layer_name_old').value;
            if (confirm(`ลบชั้นข้อมูล "${name}" ถาวรใช่หรือไม่?`)) {
                await fetch(`/api/layers/${encodeURIComponent(name)}`, { method: 'DELETE' });
                location.reload();
            }
        }

        async function deleteFeature(id) {
            if (confirm('ลบพิกัดนี้ใช่หรือไม่?')) {
                await fetch(`/api/features/${id}`, { method: 'DELETE' });
                fetchFeatures(); map.closePopup();
            }
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function openAddLayerModal() { 
            document.getElementById('modalTitle').innerText = "สร้างชั้นข้อมูลใหม่"; 
            document.getElementById('fields_container').innerHTML = '';
            addFieldRow('ชื่อ', 'Text'); addFieldRow('รายละเอียด', 'Text');
            document.getElementById('btnDeleteLayer').classList.add('hidden'); 
            toggleModal('layerModal'); 
        }
        function openEditModal(name) {
            const l = appLayers.find(layer => layer.name === name);
            document.getElementById('modalTitle').innerText = "แก้ไขชั้นข้อมูล";
            document.getElementById('new_layer_name').value = l.name;
            document.getElementById('edit_layer_name_old').value = l.name;
            document.getElementById('fields_container').innerHTML = '';
            l.fields.forEach(f => addFieldRow(f.name, f.type));
            document.getElementById('btnDeleteLayer').classList.remove('hidden');
            toggleModal('layerModal');
        }
        function closeTable() { document.getElementById('attribute-panel').classList.remove('open'); document.getElementById('map').style.height = '100vh'; setTimeout(()=>map.invalidateSize(), 300); }
        async function openTable(name) {
            document.getElementById('current-table-layer').innerText = name;
            const lInfo = appLayers.find(l => l.name === name);
            const filtered = allFeatures.filter(f => f.properties.layer_name === name);
            let h = `<tr><th class="p-2 border">ID</th>`;
            lInfo.fields.forEach(f => h += `<th class="p-2 border">${f.name}</th>`);
            h += `<th class="p-2 border">จัดการ</th></tr>`;
            document.getElementById('table-head').innerHTML = h;
            
            let b = '';
            filtered.forEach(f => {
                b += `<tr class="hover:bg-slate-50"><td class="p-2 border">${f.properties.id}</td>`;
                lInfo.fields.forEach(field => b += `<td class="p-2 border">${f.properties[field.name] || '-'}</td>`);
                b += `<td class="p-2 border text-center"><button onclick="deleteFeature(${f.properties.id})" class="text-red-500"><i class="fa-solid fa-trash"></i></button></td></tr>`;
            });
            document.getElementById('table-body').innerHTML = b;
            document.getElementById('attribute-panel').classList.add('open');
            document.getElementById('map').style.height = '55vh'; setTimeout(()=>map.invalidateSize(), 300);
        }

        fetchLayers();
    </script>
</body>
</html>
